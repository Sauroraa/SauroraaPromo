version: '3.8'

services:
  mariadb:
    image: mariadb:11
    container_name: promoteam-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: promoteam
      MYSQL_USER: promoteam
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-promoteam_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - promoteam-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  redis:
    image: redis:7-alpine
    container_name: promoteam-cache
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - promoteam-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10
      interval: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promoteam-backend
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: mysql://promoteam:${MYSQL_PASSWORD:-promoteam_pass}@mariadb:3306/promoteam
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      PORT: 5000
    volumes:
      - ./backend/src:/app/src
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    networks:
      - promoteam-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promoteam-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:5000/api
      VITE_APP_URL: ${APP_URL:-http://promoteam.sauroraa.be}
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    networks:
      - promoteam-network
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: promoteam-nginx
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf/promoteam.conf:/etc/nginx/conf.d/promoteam.conf:ro
      - ./uploads:/uploads:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - promoteam-network
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

networks:
  promoteam-network:
    driver: bridge
