# ─── Upstreams ────────────────────────────────────────────────────────────────
upstream frontend {
    server frontend:80;
    keepalive 16;
}

upstream backend {
    server backend:5000;
    keepalive 16;
}

# ─── Rate limiting zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=20r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

# ─── HTTP → HTTPS redirect + Certbot challenge ───────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name promoteam.sauroraa.be;

    # Let's Encrypt challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name promoteam.sauroraa.be;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/promoteam.sauroraa.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/promoteam.sauroraa.be/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header X-Frame-Options           "SAMEORIGIN"         always;
    add_header X-XSS-Protection          "1; mode=block"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Uploads (served directly, images only) ────────────────────────────────
    location /uploads/ {
        alias /uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Only allow image extensions
        location ~* \.(jpg|jpeg|png|webp|gif)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Block everything else in /uploads
        location ~* [^/]\.[^/]+$ {
            deny all;
        }
    }

    # ── API (backend) ─────────────────────────────────────────────────────────
    location = /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/proofs {
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Large timeout for image upload + sharp processing
        proxy_read_timeout 120s;
        client_max_body_size 60M;
    }

    location /api {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Cache public GET endpoints (missions, leaderboard)
        proxy_cache            api_cache;
        proxy_cache_valid      200 2m;
        proxy_cache_methods    GET HEAD;
        proxy_cache_key        "$scheme$request_method$host$request_uri";
        # Never cache authenticated responses
        proxy_no_cache         $http_authorization;
        proxy_cache_bypass     $http_authorization;
        add_header             X-Cache-Status $upstream_cache_status;
    }

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_read_timeout 30s;
    }

    # ── Deny dotfiles ─────────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }
}
